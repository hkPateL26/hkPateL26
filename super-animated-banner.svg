<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes gradient {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        @keyframes glitch {
          0% { text-shadow: 0.5px 0 0 #ff00ff, -0.5px 0 0 #00ffff; }
          2% { text-shadow: 1px 0 0 #ff00ff, -1px 0 0 #00ffff; }
          4% { text-shadow: 1.5px 0 0 #ff00ff, -1.5px 0 0 #00ffff; }
          6% { text-shadow: 0.5px 0 0 #ff00ff, -0.5px 0 0 #00ffff; }
          8% { text-shadow: 0.5px 0.5px 0 #ff00ff, -0.5px -0.5px 0 #00ffff; }
          10% { text-shadow: -0.5px 0.5px 0 #ff00ff, 0.5px -0.5px 0 #00ffff; }
          100% { text-shadow: 0.5px 0 0 #ff00ff, -0.5px 0 0 #00ffff; }
        }

        .container {
          background: linear-gradient(-45deg, #0d1117, #1a2333, #0d1117, #1a2333);
          background-size: 400% 400%;
          animation: gradient 10s ease infinite;
          width: 100%;
          height: 200px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          border-radius: 10px;
          border: 2px solid #3B82F6;
          box-sizing: border-box;
        }

        .name {
          font-size: 65px;
          font-weight: 900;
          color: #ffffff;
          position: relative;
          margin: 0;
          padding: 0;
          animation: glitch 1s linear infinite;
        }

        .title {
          font-size: 25px;
          font-weight: 300;
          color: #a3b3c5;
          margin-top: 10px;
          letter-spacing: 2px;
        }
      </style>
      <div class="container">
        <h1 class="name">HARI PATEL</h1>
        <p class="title">Architect of Sudarshan System</p>
      </div>
    </div>
  </foreignObject>
</svg>
